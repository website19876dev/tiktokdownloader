<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaverByZakiy | All-in-One Downloader</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#EE1D52">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #010101; color: white; }
        .tiktok-gradient { background: linear-gradient(45deg, #69C9D0 0%, #EE1D52 100%); }
        .insta-gradient { background: linear-gradient(45deg, #f09433 0%, #dc2743 100%); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
        .tab-active { border-bottom: 3px solid #EE1D52; color: white; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-[#121212] border border-gray-800 rounded-[2.5rem] p-6 md:p-8 shadow-2xl relative overflow-hidden">
        
        <div class="text-center mb-6">
            <div id="iconHeader" class="inline-block p-3 bg-white rounded-2xl mb-3 transition-all duration-500">
                <i id="mainIcon" class="fab fa-download text-2xl text-black"></i>
            </div>
            <h1 class="text-xl font-black italic tracking-tighter uppercase">SaverByZakiy</h1>
            <p class="text-gray-500 text-[9px] font-bold tracking-[0.3em] mt-1 uppercase">Multi-Platform Downloader</p>
        </div>

        <div class="flex justify-around mb-6 border-b border-gray-800 text-gray-500 text-xs font-bold uppercase tracking-widest">
            <button onclick="switchTab('tiktok')" id="tabTT" class="pb-2 tab-active transition-all">TikTok</button>
            <button onclick="switchTab('insta')" id="tabIG" class="pb-2 transition-all">Instagram</button>
        </div>

        <div class="space-y-3">
            <input type="text" id="urlInput" placeholder="Tempel link di sini..." 
                class="w-full px-5 py-4 bg-[#1e1e1e] border border-gray-700 rounded-2xl focus:border-[#69C9D0] outline-none text-sm transition-all text-white">
            <button onclick="processLink()" id="btnGo" class="w-full py-4 tiktok-gradient rounded-2xl font-extrabold text-sm transform active:scale-95 transition-all shadow-lg">
                <i class="fas fa-magic mr-2"></i>Ambil Konten
            </button>
        </div>

        <div id="resultBox" class="hidden mt-6 animate-fade-in">
            <div id="videoContainer" class="hidden text-center">
                <video id="videoPlayer" controls class="w-full rounded-2xl mb-4 bg-black border border-gray-800">
                    <source id="videoSource" src="" type="video/mp4">
                </video>
            </div>

            <div id="photoContainer" class="hidden">
                <div id="photoList" class="custom-scroll space-y-4 max-h-[350px] overflow-y-auto pr-2"></div>
            </div>

            <button id="mainDlBtn" onclick="forceDownload()" class="w-full py-3 mt-4 bg-white text-black rounded-xl font-bold text-xs uppercase shadow-md">
                <i class="fas fa-download mr-2"></i>Simpan Ke Galeri
            </button>
        </div>

        <div id="loader" class="hidden text-center mt-6">
            <div class="inline-block w-5 h-5 border-2 border-[#69C9D0] border-t-transparent rounded-full animate-spin"></div>
            <p class="text-[10px] text-gray-500 mt-2 italic font-medium">Lagi diproses bolo...</p>
        </div>

        <div class="mt-8 pt-5 border-t border-gray-800 text-center text-[8px] text-gray-700 font-bold uppercase tracking-[0.4em]">
            &copy; 2026 Developed by Zakiy
        </div>
    </div>

    <script>
        let currentMode = 'tiktok';
        let currentDlUrl = "";

        function switchTab(mode) {
            currentMode = mode;
            const btn = document.getElementById('btnGo');
            const icon = document.getElementById('mainIcon');
            const tabTT = document.getElementById('tabTT');
            const tabIG = document.getElementById('tabIG');

            document.getElementById('resultBox').classList.add('hidden');
            
            if(mode === 'tiktok') {
                btn.className = "w-full py-4 tiktok-gradient rounded-2xl font-extrabold text-sm transform active:scale-95 transition-all shadow-lg";
                icon.className = "fab fa-tiktok text-2xl text-black";
                tabTT.classList.add('tab-active');
                tabIG.classList.remove('tab-active');
            } else {
                btn.className = "w-full py-4 insta-gradient rounded-2xl font-extrabold text-sm transform active:scale-95 transition-all shadow-lg";
                icon.className = "fab fa-instagram text-2xl text-black";
                tabIG.classList.add('tab-active');
                tabTT.classList.remove('tab-active');
            }
        }

        async function processLink() {
            const url = document.getElementById('urlInput').value;
            const loader = document.getElementById('loader');
            const result = document.getElementById('resultBox');
            const videoCont = document.getElementById('videoContainer');
            const photoCont = document.getElementById('photoContainer');
            const photoList = document.getElementById('photoList');

            if (!url.includes(currentMode === 'tiktok' ? 'tiktok.com' : 'instagram.com')) {
                alert(`Pastikan link ${currentMode} ya bolo!`);
                return;
            }

            loader.classList.remove('hidden');
            result.classList.add('hidden');

            try {
                if (currentMode === 'tiktok') {
                    const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`);
                    const data = await response.json();
                    if (data.code === 0) {
                        const item = data.data;
                        if (item.images) {
                            videoCont.classList.add('hidden');
                            photoCont.classList.remove('hidden');
                            photoList.innerHTML = '';
                            item.images.forEach((img, i) => {
                                photoList.innerHTML += `
                                    <div class="bg-[#1e1e1e] p-3 rounded-2xl border border-gray-800 mb-3">
                                        <img src="${img}" class="rounded-xl w-full mb-2 border border-gray-700">
                                        <button onclick="forceDownload('${img}', 'foto_${i+1}')" class="w-full py-2 bg-gray-800 text-[10px] font-bold rounded-lg border border-gray-700">UNDUH FOTO #${i+1}</button>
                                    </div>`;
                            });
                            currentDlUrl = item.music;
                            document.getElementById('mainDlBtn').innerHTML = '<i class="fas fa-music mr-2"></i>Simpan Musik (MP3)';
                        } else {
                            photoCont.classList.add('hidden');
                            videoCont.classList.remove('hidden');
                            document.getElementById('videoSource').src = item.play;
                            document.getElementById('videoPlayer').load();
                            currentDlUrl = item.play;
                            document.getElementById('mainDlBtn').innerHTML = '<i class="fas fa-video mr-2"></i>Simpan Video (MP4)';
                        }
                    }
                } else {
                    // Instagram Mode
                    const videoId = url.split("/")[4];
                    const directUrl = `https://ddinstagram.com/reels/${videoId}/?v=1`;
                    photoCont.classList.add('hidden');
                    videoCont.classList.remove('hidden');
                    document.getElementById('videoSource').src = directUrl;
                    document.getElementById('videoPlayer').load();
                    currentDlUrl = directUrl;
                    document.getElementById('mainDlBtn').innerHTML = '<i class="fas fa-download mr-2"></i>Simpan Media (IG)';
                }
                result.classList.remove('hidden');
            } catch (err) {
                alert('Gagal mengambil data!');
            } finally {
                loader.classList.add('hidden');
            }
        }

        async function forceDownload(url = currentDlUrl, name = "media") {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = `SaverZakiy_${name}_${Date.now()}.mp4`;
                if(url.includes('.jpg') || name.includes('foto')) a.download = `SaverZakiy_${name}.jpg`;
                if(url.includes('.mp3')) a.download = `SaverZakiy_Music.mp3`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            } catch (e) {
                window.open(url, '_blank');
            }
        }

        // Registrasi Service Worker untuk PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
